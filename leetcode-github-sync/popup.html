<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LeetCode GitHub Sync</title>
    <style>
      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        font: 14px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #172033;
        background: #f7f8fb;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 18px;
      }

      .panel {
        background: #fff;
        border: 1px solid #dde2ee;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 12px;
      }

      .label {
        color: #667085;
        font-size: 12px;
        margin-bottom: 2px;
      }

      .value {
        margin-bottom: 10px;
        word-break: break-word;
      }

      button,
      a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 0;
        border-radius: 6px;
        padding: 9px 12px;
        background: #2563eb;
        color: #fff;
        cursor: pointer;
        font-weight: 600;
        text-decoration: none;
      }

      button.secondary {
        background: #eef2ff;
        color: #1e3a8a;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      #message {
        min-height: 20px;
        color: #475467;
      }

      .error {
        color: #b42318;
      }

      .success {
        color: #067647;
      }
    </style>
  </head>
  <body>
    <h1>LeetCode GitHub Sync</h1>

    <div class="panel">
      <div class="label">Sync status</div>
      <div id="syncStatus" class="value">Loading...</div>

      <div class="label">Last synced problem</div>
      <div id="lastSyncedProblem" class="value">None yet</div>

      <div class="label">Last sync time</div>
      <div id="lastSyncedAt" class="value">-</div>
    </div>

    <div class="actions">
      <button id="syncButton">Sync current accepted solution</button>
      <button id="settingsButton" class="secondary">Settings</button>
    </div>

    <p id="message"></p>

    <script src="utils.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
