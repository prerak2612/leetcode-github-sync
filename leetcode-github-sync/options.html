<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LeetCode GitHub Sync Settings</title>
    <style>
      body {
        margin: 0;
        font: 15px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #172033;
        background: #f7f8fb;
      }

      main {
        max-width: 720px;
        padding: 32px 20px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 26px;
      }

      form {
        margin-top: 24px;
        padding: 20px;
        border: 1px solid #dde2ee;
        border-radius: 8px;
        background: #fff;
      }

      label {
        display: block;
        margin: 0 0 16px;
        font-weight: 600;
      }

      input {
        box-sizing: border-box;
        width: 100%;
        margin-top: 6px;
        padding: 10px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        font: inherit;
      }

      .help {
        display: block;
        color: #667085;
        font-size: 13px;
        font-weight: 400;
        margin-top: 4px;
      }

      button {
        border: 0;
        border-radius: 6px;
        padding: 10px 14px;
        background: #2563eb;
        color: #fff;
        cursor: pointer;
        font-weight: 700;
      }

      #message {
        margin-left: 12px;
      }

      .error {
        color: #b42318;
      }

      .success {
        color: #067647;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Settings</h1>
      <p>Configure the GitHub repository where accepted LeetCode submissions should be saved.</p>

      <form id="settingsForm">
        <label>
          GitHub token
          <input id="githubToken" type="password" autocomplete="off" placeholder="github_pat_...">
          <span class="help">Stored by Chrome extension storage. It is never committed or hardcoded.</span>
        </label>

        <label>
          GitHub owner or username
          <input id="githubOwner" type="text" placeholder="PRERAK-ARYA">
        </label>

        <label>
          Repository name
          <input id="repoName" type="text" placeholder="Leetcode-Solutions">
        </label>

        <label>
          Branch name
          <input id="branch" type="text" placeholder="main">
        </label>

        <button type="submit">Save settings</button>
        <span id="message"></span>
      </form>
    </main>

    <script src="utils.js"></script>
    <script src="options.js"></script>
  </body>
</html>
